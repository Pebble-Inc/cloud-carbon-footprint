name: CCF - Build & Push (GCP)

on:
  push:
    branches:
      - develop
      - 'release/*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # Required for OIDC → Google Auth
    permissions:
      contents: read
      id-token: write
      actions: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set Build Parameters
        run: |
          set -e
          BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD | sed 's/\//_/g')
          COMMIT_SHA=$(git rev-parse --short HEAD)
          echo "DTAG_BRANCH=$BRANCH_NAME" >> $GITHUB_ENV
          echo "DTAG_SHA=$COMMIT_SHA" >> $GITHUB_ENV
          echo "Branch: $BRANCH_NAME | SHA: $COMMIT_SHA"

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: https://registry.npmjs.org/

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-node_modules-${{ hashFiles('yarn.lock', '**/package.json') }}

      - name: Install Dependencies
        run: yarn install --immutable

      # GCP OIDC authentication (replace AWS authentication)
      - name: Google Auth (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          export_environment_variables: true

      # Google Cloud setup
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      # Download GCP Secrets from Secret Manager
      - name: Retrieve Secrets from GCP Secret Manager
        shell: bash
        run: |
          set -e

          # Retrieve secrets from GCP
          GCP_SECRET_NAME="pebble-agent-manager-dev"
          DOCUMENTDB_SECRET=$(gcloud secrets versions access latest --secret="${GCP_SECRET_NAME}" --project="${{ secrets.GCP_PROJECT_ID }}")

          if [[ -z "$DOCUMENTDB_SECRET" ]]; then
            echo "ERROR: Could not fetch secret: ${GCP_SECRET_NAME}"; exit 1
          fi

          # Parsing secret data (example)
          DOCUMENTDB_URI=$(jq -r '.DOCUMENTDB_URI' <<<"$DOCUMENTDB_SECRET")
          DOCUMENTDB_USERNAME=$(jq -r '.DOCUMENTDB_USERNAME' <<<"$DOCUMENTDB_SECRET")
          DOCUMENTDB_PASSWORD=$(jq -r '.DOCUMENTDB_PASSWORD' <<<"$DOCUMENTDB_SECRET")
          TENANT_DB=$(jq -r '.TENANT_DB' <<<"$DOCUMENTDB_SECRET")

          # Export secrets as environment variables for docker build
          echo "DOCUMENTDB_URI=$DOCUMENTDB_URI" >> $GITHUB_ENV
          echo "DOCUMENTDB_USERNAME=$DOCUMENTDB_USERNAME" >> $GITHUB_ENV
          echo "DOCUMENTDB_PASSWORD=$DOCUMENTDB_PASSWORD" >> $GITHUB_ENV
          echo "TENANT_DB=$TENANT_DB" >> $GITHUB_ENV

      # Build & Push Docker Image to Artifact Registry
      - name: Build, Tag, and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./packages/api
          push: true
          tags: |
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO_CCF }}/pebble-ccf:${{ env.DTAG_BRANCH }}
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO_CCF }}/pebble-ccf:${{ env.DTAG_SHA }}
          build-args: |
            DOCUMENTDB_URI=${{ env.DOCUMENTDB_URI }}
            DOCUMENTDB_USERNAME=${{ env.DOCUMENTDB_USERNAME }}
            DOCUMENTDB_PASSWORD=${{ env.DOCUMENTDB_PASSWORD }}
            TENANT_DB=${{ env.TENANT_DB }}

      # Optional: Deploy to GKE (uncomment for GKE deployment)
      # - name: Determine Deployment Environment (GKE)
      #   run: |
      #     if [[ "${{ env.DTAG_BRANCH }}" == "develop" ]]; then
      #       echo "GKE_CLUSTER=${{ secrets.GKE_DEV_CLUSTER }}" >> $GITHUB_ENV
      #       echo "GKE_LOCATION=${{ secrets.GKE_DEV_LOCATION }}" >> $GITHUB_ENV
      #       echo "K8S_NAMESPACE=pebble-ccf-dev" >> $GITHUB_ENV
      #     elif [[ "${{ env.DTAG_BRANCH }}" == release_* ]]; then
      #       echo "GKE_CLUSTER=${{ secrets.GKE_PROD_CLUSTER }}" >> $GITHUB_ENV
      #       echo "GKE_LOCATION=${{ secrets.GKE_PROD_LOCATION }}" >> $GITHUB_ENV
      #       echo "K8S_NAMESPACE=pebble-ccf" >> $GITHUB_ENV
      #     else
      #       echo "Unsupported branch ${ { env.DTAG_BRANCH } }"; exit 1
