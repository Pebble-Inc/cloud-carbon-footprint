name: Server Docker Build and Deploy on Success

on:
  push:
    branches:
      - develop
      - release/*

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.ref_name }}

      - name: Set Build Parameters 
        id: dtag
        run: |
          set -e
          BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD | sed 's/\//_/g')
          COMMIT_SHA=$(git rev-parse --short HEAD)
          echo "DTAG_BRANCH=$BRANCH_NAME" >> $GITHUB_ENV  
          echo "DTAG_SHA=$COMMIT_SHA" >> $GITHUB_ENV 

      - name: Use Node.js 18 
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: https://registry.npmjs.org/

      - name: Cache Dependencies
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-node_modules-${{ hashFiles('yarn.lock', '**/package.json') }}

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
  
      - name: Retrieve Secrets from AWS Secrets Manager
        run: |
          set -e

          # Define the AWS region dynamically from GitHub Secrets
          AWS_REGION=${{ secrets.AWS_REGION }}

          echo "Retrieving secrets from AWS Secrets Manager in region: $AWS_REGION"

          # Retrieve the SSL Certificate from 'documentDB-dev-ecs-globalkey'
          SSL_CERT_SECRET=$(aws secretsmanager get-secret-value \
            --region $AWS_REGION \
            --secret-id documentDB-dev-ecs-globalkey \
            --query "SecretString" \
            --output text || echo "")

          if [[ -z "$SSL_CERT_SECRET" ]]; then
            echo "❌ ERROR: SSL Certificate Secret could not be retrieved."
            exit 1
          fi

          # Save the SSL Certificate as a file
          echo "$SSL_CERT_SECRET" > global-bundle.pem
          echo "DOCUMENTDB_SSL_CA_FILE=global-bundle.pem" >> $GITHUB_ENV

          # Retrieve Key-Value Secrets from 'documentDB-dev-ecs'
          SECRET_ECS=$(aws secretsmanager get-secret-value \
            --region $AWS_REGION \
            --secret-id documentDB-dev-ecs \
            --query "SecretString" \
            --output text || echo "")

          if [[ -z "$SECRET_ECS" ]]; then
            echo "❌ ERROR: Key-Value Secrets could not be retrieved."
            exit 1
          fi

          # Extract values from JSON
          DOCUMENTDB_URI=$(echo "$SECRET_ECS" | jq -r '.DOCUMENTDB_URI')
          DOCUMENTDB_USERNAME=$(echo "$SECRET_ECS" | jq -r '.DOCUMENTDB_USERNAME')
          DOCUMENTDB_PASSWORD=$(echo "$SECRET_ECS" | jq -r '.DOCUMENTDB_PASSWORD')
          CACHE_MODE=$(echo "$SECRET_ECS" | jq -r '.CACHE_MODE')
          TENANT_DB=$(echo "$SECRET_ECS" | jq -r '.TENANT_DB')
          AWS_AUTH_MODE=$(echo "$SECRET_ECS" | jq -r '.AWS_AUTH_MODE')
          AWS_TARGET_ACCOUNT_ROLE_NAME=$(echo "$SECRET_ECS" | jq -r '.AWS_TARGET_ACCOUNT_ROLE_NAME')
          
          # Export environment variables for Docker build
          echo "DOCUMENTDB_URI=$DOCUMENTDB_URI" >> $GITHUB_ENV
          echo "DOCUMENTDB_USERNAME=$DOCUMENTDB_USERNAME" >> $GITHUB_ENV
          echo "DOCUMENTDB_PASSWORD=$DOCUMENTDB_PASSWORD" >> $GITHUB_ENV
          echo "CACHE_MODE=$CACHE_MODE" >> $GITHUB_ENV
          echo "TENANT_DB=$TENANT_DB" >> $GITHUB_ENV
          echo "AWS_AUTH_MODE=$AWS_AUTH_MODE" >> $GITHUB_ENV
          echo "AWS_TARGET_ACCOUNT_ROLE_NAME=$AWS_TARGET_ACCOUNT_ROLE_NAME" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Download DocumentDB Certificate Bundle
        run: |
          echo "Downloading AWS DocumentDB certificate bundle..."
          cd packages/api
          curl -o global-bundle.pem https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem
          echo "Certificate bundle downloaded successfully"

      - name: Build Packages
        run: |
          # First build all dependencies in order
          echo "Building common package..."
          cd packages/common
          yarn build

          echo "Building app package..."
          cd ../app
          yarn build
          # Finally build API package
          cd ../api
          yarn install
          yarn build
          cp ../../yarn.lock .

      - name: Build, Tag, and Push Docker Image to Amazon ECR
        uses: docker/build-push-action@v4
        with:
          context: ./packages/api
          push: true
          tags: |
            ${{ secrets.AWS_ECR_REPO }}:${{ env.DTAG_BRANCH }}
            ${{ secrets.AWS_ECR_REPO }}:${{ env.DTAG_SHA }}
          build-args: |
            VERSION=${{ env.DTAG_SHA }}
            DOCUMENTDB_URI=${{ env.DOCUMENTDB_URI }}
            DOCUMENTDB_USERNAME=${{ env.DOCUMENTDB_USERNAME }}
            DOCUMENTDB_PASSWORD=${{ env.DOCUMENTDB_PASSWORD }}
            CACHE_MODE=${{ env.CACHE_MODE }}
            TENANT_DB=${{ env.TENANT_DB }}
            AWS_AUTH_MODE=${{ env.AWS_AUTH_MODE }}
            AWS_TARGET_ACCOUNT_ROLE_NAME=${{ env.AWS_TARGET_ACCOUNT_ROLE_NAME }}
          no-cache: true
          progress: plain

      - name: Determine Deployment Environment
        run: |
          set -e
          if [[ "${{ env.DTAG_BRANCH }}" == "develop" ]]; then
            echo "ECS_CLUSTER=${{ secrets.ECS_DEV_CLUSTER }}" >> $GITHUB_ENV
            echo "ECS_SERVICE=${{ secrets.ECS_DEV_SERVICE }}" >> $GITHUB_ENV
          elif [[ "${{ env.DTAG_BRANCH }}" == release_* ]]; then
            echo "ECS_CLUSTER=${{ secrets.ECS_PROD_CLUSTER }}" >> $GITHUB_ENV
            echo "ECS_SERVICE=${{ secrets.ECS_PROD_SERVICE }}" >> $GITHUB_ENV
          else
            echo "Error detecting ECS cluster ..."
          fi

      - name: Deploy to ECS
        run: |
          set -e
          CLUSTER_NAME="${{ env.ECS_CLUSTER }}"
          SERVICE_NAME="${{ env.ECS_SERVICE }}"

          PEBBLE_CCF_IMAGE="${{ secrets.AWS_ECR_REPO }}:${{ env.DTAG_SHA }}"
          echo "Deploying to ECS Cluster: $CLUSTER_NAME, Service: $SERVICE_NAME..."
          echo "Updating only pebble-ccf image: $PEBBLE_CCF_IMAGE"

          # Get current task definition ARN
          OLD_TASK_DEF=$(aws ecs describe-services --cluster $CLUSTER_NAME --services $SERVICE_NAME --query "services[0].taskDefinition" --output text)

          # Extract full task definition JSON and update the `pebble-ccf` image
          aws ecs describe-task-definition --task-definition $OLD_TASK_DEF --query "taskDefinition" | \
            jq --arg CCF_IMAGE "$PEBBLE_CCF_IMAGE" \
            '.containerDefinitions |= map(if .name == "pebble-ccf" then .image = $CCF_IMAGE else . end) |
             {family: .family, containerDefinitions: .containerDefinitions, taskRoleArn: .taskRoleArn, executionRoleArn: .executionRoleArn, networkMode: .networkMode}' \
            > new-task-def.json

          # Register the updated task definition
          NEW_TASK_DEF=$(aws ecs register-task-definition --cli-input-json file://new-task-def.json --query "taskDefinition.taskDefinitionArn" --output text)

          # Update the ECS service to use the new task definition
          aws ecs update-service --cluster $CLUSTER_NAME --service $SERVICE_NAME --task-definition $NEW_TASK_DEF

          echo "ECS Service updated successfully!"
